<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>个人策划主页 - 文档索引</title>
    <meta name="description" content="展示策划案/拆解案等文档，并支持搜索与在线预览（PDF）。" />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="wrap">
        <div class="brand">
          <div class="logo" aria-hidden="true">📚</div>
          <div>
            <h1 class="title">个人策划主页</h1>
            <p class="subtitle">文档索引与在线预览（来自 `MyWeb/Data`）</p>
          </div>
        </div>
      </div>
    </header>

    <main class="wrap">
      <section class="layout" aria-label="页面布局">
        <aside class="sidebar" aria-label="左侧导航（搜索与分类）">
          <div class="side-block">
            <div class="side-title">搜索</div>
            <label class="field">
              <span class="field-label">关键词</span>
              <input id="search" type="search" placeholder="输入文件名关键词…" autocomplete="off" />
            </label>
          </div>

          <div class="side-block">
            <div class="side-title">分类</div>
            <nav id="sideCats" class="side-cats" aria-label="分类导航"></nav>
          </div>
        </aside>

        <section class="content">
          <div class="content-head">
            <div class="meta" id="meta"></div>
          </div>
          <section class="list" id="list" aria-live="polite"></section>
        </section>
      </section>

      <noscript>
        <div class="notice">
          你的浏览器禁用了 JavaScript，无法加载文档清单。请启用后重试。
        </div>
      </noscript>
    </main>

    <div id="modal" class="modal" hidden role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <div class="modal-backdrop" data-close="1"></div>
      <div class="modal-panel" role="document">
        <div class="modal-header">
          <h2 class="modal-title" id="modalTitle">预览</h2>
          <button class="icon-btn" id="closeModal" type="button" aria-label="关闭预览">×</button>
        </div>
        <div class="modal-body">
          <iframe id="previewFrame" title="PDF 预览" loading="lazy"></iframe>
        </div>
        <div class="modal-footer">
          <a id="downloadLink" class="btn" href="#" target="_blank" rel="noopener noreferrer">打开原文件</a>
        </div>
      </div>
    </div>

    <script type="module" src="./app.js"></script>
  </body>
</html>
